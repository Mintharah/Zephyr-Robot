# Peripherals
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ADC=y
CONFIG_ADC_STM32=y
CONFIG_PWM=y
CONFIG_PWM_STM32=y
CONFIG_PWM_CAPTURE=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Pinctrl (required on STM32)
CONFIG_PINCTRL=y

# Threads / kernel
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_TIMESLICING=y

CONFIG_RING_BUFFER=y
